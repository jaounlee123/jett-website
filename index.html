<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

        /* 기본 스타일 및 웹폰트 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; line-height: 1.6; color: #333; word-break: keep-all; }
        
        /* ------------------------------------------- */
        /* [공통 및 모바일 기본 스타일]                  */
        /* ------------------------------------------- */
        
        /* 헤더 스타일 */
        header { 
            background: #fff; 
            padding: 0 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #eee; 
            position: fixed; 
            width: 100%; 
            height: 60px;
            top: 0; 
            z-index: 1000; 
        }
        .logo { font-size: 22px; font-weight: 800; color: #1a2a6c; cursor: pointer; }
        
        /* 네비게이션 */
        nav { display: flex; align-items: center; height: 100%; }
        .nav-item { position: relative; margin-left: 12px; height: 100%; display: flex; align-items: center; cursor: pointer; }
        .nav-link { text-decoration: none; color: #555; font-weight: 600; padding: 10px 5px; font-size: 14px; }
        
        /* 드롭다운 (모바일 기본) */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #fff;
            min-width: 120px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
            border-radius: 8px;
            top: 60px; 
            right: 0;
            border: 1px solid #eee;
            z-index: 1001;
        }
        .dropdown-content a {
            color: #555;
            padding: 14px 16px;
            text-decoration: none;
            display: block;
            font-size: 13px;
            border-bottom: 1px solid #f9f9f9;
            cursor: pointer;
        }
        .dropdown-content a:last-child { border-bottom: none; }
        .nav-item.active-menu .dropdown-content { display: block; }

        /* 섹션 제어 및 애니메이션 */
        .content-section { 
            display: none; 
            padding: 90px 20px 60px; 
            min-height: 100vh; 
            opacity: 0; 
            transform: translateY(10px);
            transition: all 0.4s ease;
        }
        .content-section.active { 
            display: block !important; 
            opacity: 1; 
            transform: translateY(0);
        }
