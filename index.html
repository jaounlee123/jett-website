<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JETT(Johns Elite Teaching Team) - 엘리트 영어교사로 구성된 팀</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; line-height: 1.6; color: #333; word-break: keep-all; }
        
        header { 
            background: #fff; 
            padding: 0 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #eee; 
            position: fixed; 
            width: 100%; 
            height: 60px;
            top: 0; 
            z-index: 1000; 
        }
        .logo { font-size: 22px; font-weight: 800; color: #1a2a6c; cursor: pointer; }
        
        nav { display: flex; align-items: center; height: 100%; }
        .nav-item { position: relative; margin-left: 12px; height: 100%; display: flex; align-items: center; cursor: pointer; }
        .nav-link { text-decoration: none; color: #555; font-weight: 600; padding: 10px 5px; font-size: 14px; }
        
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #fff;
            min-width: 120px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
            border-radius: 8px;
            top: 60px; 
            right: 0;
            border: 1px solid #eee;
            z-index: 1001;
        }
        .dropdown-content a {
            color: #555;
            padding: 14px 16px;
            text-decoration: none;
            display: block;
            font-size: 13px;
            border-bottom: 1px solid #f9f9f9;
            cursor: pointer;
        }
        .dropdown-content a:last-child { border-bottom: none; }
        .nav-item.active-menu .dropdown-content { display: block; }

        .content-section { 
            display: none; 
            padding: 90px 20px 60px; 
            min-height: 100vh; 
            opacity: 0; 
            transform: translateY(10px);
            transition: all 0.4s ease;
        }
        .content-section.active { 
            display: block; 
            opacity: 1; 
            transform: translateY(0);
        }

        .hero { 
            height: 80vh; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('image/Gemini_Generated_Image_gp9vwrgp9vwrgp9v.png'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; color: #fff; border-radius: 0 0 24px 24px;
            margin-top: -30px;
        }
        .hero h1 { font-size: 1.8rem; margin-bottom: 15px; padding: 0 20px; line-height: 1.4; font-weight: 800; }
        .hero p { font-size: 0.95rem; opacity: 0.9; margin: 0; padding: 0 20px; }
        .btn { 
            margin-top: 25px; padding: 14px 36px; background: #f39c12; color: #fff; 
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer; 
            font-size: 0.95rem; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
            transition: background 0.2s;
        }

        .section-title { text-align: center; font-size: 1.6rem; color: #1a2a6c; margin-bottom: 25px; font-weight: 800; }
        
        .intro-wrapper { max-width: 750px; margin: 0 auto; text-align: center; padding: 0 5px; }
        .intro-wrapper .p-main { 
            font-size: 1.15rem; 
            line-height: 1.75; 
            margin-bottom: 30px; 
            letter-spacing: -0.03em;
        }

        .intro-wrapper .p-sub { 
            font-size: 0.95rem; 
            color: #555; 
            margin: 14px auto; 
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center; 
            width: max-content;
            max-width: 100%;
        }
        .intro-wrapper .p-sub::before {
            content: '✓';
            color: #f39c12;
            font-weight: bold;
            margin-right: 8px;
            flex-shrink: 0;
        }

        /* ─── [수정] 사진에 맞춰 간격을 극도로 좁힌 초밀착 카드 레이아웃 ─── */
        .profile-container {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 100%;
            margin: 40px auto 20px;
            padding: 40px 20px;
            height: 460px;
        }

        .profile-card {
            position: relative;
            width: 290px;
            height: 400px;
            background: #f9f9f9; 
            padding: 40px 25px; 
            border-radius: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #eef0f5;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
        }
        
        /* 대표 인스트럭터 카드 (제일 위로 쌓여서 먼저 보임) */
        .card-1 {
            z-index: 20; 
            box-shadow: 10px 0 25px rgba(0,0,0,0.12); /* 겹치는 부분 경계선 입체감을 위해 우측 그림자 강조 */
        }
        
        /* 모집중 카드 (사진처럼 인덱스 부분만 아주 좁게 보이도록 밀착 조절) */
        .card-2 {
            z-index: 10; 
            margin-left: -245px; /* 카드가 촘촘하게 겹치도록 대폭 줄임 (카드 너비 290px 중 45px만 노출) */
            box-shadow: -4px 0 16px rgba(0,0,0,0.03);
        }

        /* 호버 시 깔끔하게 상단으로 쏙 올라오는 애니메이션 */
        .profile-card:hover {
            z-index: 100 !important; 
            transform: translateY(-40px); 
            box-shadow: 0 15px 35px rgba(26, 42, 108, 0.15);
            background: #fff;
        }
        
        /* 모집중 카드 커스텀 */
        .profile-card.recruiting {
            background: #fdfdfd;
            border: 2px dashed #cbd5e1;
            justify-content: center;
        }
        .profile-card.recruiting:hover {
            border-style: solid;
            border-color: #f39c12;
            background: #fff;
        }
        .recruiting-icon {
            font-size: 2.5rem;
            color: #f39c12;
            margin-bottom: 15px;
        }

        .profile-info { width: 100%; }
        .profile-info h3 { font-size: 1.4rem; margin: 0 0 6px 0; color: #1a2a6c; text-align: center; font-weight: 800; }
        .profile-info .sub-title { color: #f39c12; font-weight: 700; margin-bottom: 25px; display: block; font-size: 0.85rem; text-align: center; }
        
        .profile-list { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
            text-align: left;
            display: inline-block;
        }
        .profile-list li { margin-bottom: 12px; font-size: 0.9rem; display: flex; align-items: flex-start; line-height: 1.4; color: #444; }
        .profile-list li::before { content: '✓'; color: #f39c12; font-weight: bold; margin-right: 8px; flex-shrink: 0; }
        /* ────────────────────────────────────────────────────────────── */

        .service-grid { display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 500px; margin: 0 auto; }
        .service-item { padding: 30px 20px; background: #f9f9f9; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .service-item h3 { margin-top: 0; font-size: 1.3rem; color: #1a2a6c; }

        .contact-box { background: #f9f9f9; padding: 35px 20px; border-radius: 16px; width: 100%; max-width: 360px; margin: 0 auto; }
        .contact-box p { font-size: 1rem; margin: 18px 0; }
        .contact-box a { color: #1a2a6c; text-decoration: none; font-weight: bold; border-bottom: 2px solid #f39c12; padding-bottom: 2px; }

        .board-wrapper { max-width: 800px; margin: 0 auto; background: #fff; padding: 10px; }
        .board-header { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .btn-sm { padding: 8px 18px; background: #1a2a6c; color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
        .btn-sm.btn-secondary { background: #eee; color: #333; margin-right: 8px; }
        
        .board-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; table-layout: fixed; }
        .board-table th, .board-table td { padding: 12px 6px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .board-table th { background: #f8f9fa; color: #1a2a6c; font-weight: 700; }
        
        .col-num { width: 45px; text-align: center; }
        .col-date { width: 75px; text-align: center; } 
        
        .board-table td.center { text-align: center; color: #888; font-size: 0.85rem; white-space: nowrap; }
        .board-table td.date-cell { white-space: nowrap; letter-spacing: -0.02em; } 
        
        .board-table td.title { 
            color: #333; 
            cursor: pointer; 
            font-weight: 500; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }
        .board-table td.title:hover { text-decoration: underline; color: #f39c12; }
        .no-data { text-align: center; padding: 40px 0; color: #999; }

        .write-form { display: none; background: #f9f9f9; padding: 20px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 0.9rem; color: #1a2a6c; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 0.9rem; }
        .form-control:focus { border-color: #1a2a6c; outline: none; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #fff; width: 100%; max-width: 600px; border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); position: relative; }
        .modal-title { font-size: 1.3rem; color: #1a2a6c; margin-top: 0; margin-bottom: 10px; font-weight: 800; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-date { font-size: 0.8rem; color: #999; text-align: right; margin-bottom: 15px; }
        .modal-body { font-size: 0.95rem; line-height: 1.7; white-space: pre-wrap; color: #444; min-height: 150px; max-height: 400px; overflow-y: auto; }
        .modal-footer { display: flex; justify-content: flex-end; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; gap: 8px; }

        @media (min-width: 1024px) {
            header { height: 80px; padding: 0 8%; }
            .logo { font-size: 28px; }
            .nav-item { margin-left: 30px; }
            .nav-link { font-size: 16px; padding: 15px 10px; }
            
            .nav-item:hover .dropdown-content { display: block; }
            .dropdown-content { top: 75px; min-width: 140px; }
            .dropdown-content a { font-size: 15px; padding: 15px 20px; }
            
            .content-section { padding: 140px 20px 80px; }
            
            .hero { height: 85vh; border-radius: 0 0 40px 40px; }
            .hero h1 { 
                font-size: 3.5rem; 
                margin-bottom: 20px; 
                line-height: 1.3; 
                white-space: nowrap; 
                padding: 0 40px;
            }
            .hero p { font-size: 1.3rem; }
            .btn { font-size: 1.1rem; padding: 18px 50px; margin-top: 35px; }
            .btn:hover { background: #e67e22; }

            .section-title { font-size: 2.4rem; margin-bottom: 45px; }
            
            .intro-wrapper .p-main { font-size: 1.4rem; line-height: 1.8; margin-bottom: 20px; }
            .intro-wrapper .p-sub { font-size: 1.1rem; margin: 10px auto; }
            
            /* ─── [변경] PC 고해상도 모니터용 초밀착 간격 세부 조율 ─── */
            .profile-container { 
                height: 500px;
                margin-top: 50px;
            }
            .profile-card { 
                width: 320px;
                height: 440px;
            }
            .card-2 { margin-left: -270px; } /* 넓은 화면에서도 밀착도를 완벽하게 고정 */
            
            .profile-info h3 { font-size: 1.6rem; }
            .profile-info .sub-title { font-size: 0.9rem; }
            .profile-list li { font-size: 1rem; margin-bottom: 14px; }
            /* ────────────────────────────────────────────────── */
            
            .service-grid { grid-template-columns: repeat(2, 1fr); gap: 30px; max-width: 800px; }
            .service-item { padding: 50px 30px; border-radius: 16px; transition: transform 0.2s, box-shadow 0.2s; }
            .service-item:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
            .service-item h3 { font-size: 1.6rem; }
            .service-item p { font-size: 1.1rem; }

            .contact-box { max-width: 450px; padding: 50px 40px; }
            .contact-box p { font-size: 1.2rem; }

            .board-wrapper { padding: 0; }
            .board-table { font-size: 1rem; }
            .board-table th, .board-table td { padding: 16px 15px; }
            .btn-sm { font-size: 0.95rem; padding: 10px 24px; }
            
            .col-num { width: 70px; }
            .col-date { width: 130px; }
            .board-table td.center { font-size: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="showSection('home')">JETT</div>
    <nav>
        <div class="nav-item" onclick="toggleMenu(event, this)">
            <span class="nav-link">JETT ▾</span>
            <div class="dropdown-content">
                <a onclick="event.stopPropagation(); showSection('jett-intro')">JETT 소개</a>
                <a onclick="event.stopPropagation(); showSection('about')">교사 소개</a>
            </div>
        </div>
        <div class="nav-item">
            <a class="nav-link" onclick="showSection('service')">서비스</a>
        </div>
        <div class="nav-item" onclick="toggleMenu(event, this)">
            <span class="nav-link">커뮤니티 ▾</span>
